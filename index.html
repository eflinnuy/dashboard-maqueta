<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title> Maqueta Dashboard Hospital de Clínicas</title>
</head>
<body class="bg-light">
<div class="container py-5">
    <header class="mb-4">
        <h1 class="text-primary fw-bold">Panel Administrativo</h1>
        <p class="text-muted">Gestión y digitalización de documentos para pacientes</p>
    </header>
    <section class="card mb-5 shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Cargar Nuevo Documento</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-12 col-md-6 mb-3">
                    <label class="form-label">Nombre del Documento</label>
                    <input type="text" class="form-control" placeholder="Ej: Preparación estudios imagenológicos">
                </div>
                <div class="col-12 col-md-6 mb-3">
                    <label class="form-label">Categoría</label>
                    <select class="form-select">
                        <option>Indicaciones Médicas</option>
                        <option>Enfermería</option>
                        <option>Encuestas de Satisfacción</option>
                    </select>
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label">Archivo (PDF)</label>
                    <input type="file" class="form-control">
                </div>
                <div class="col-12 text-end">
                    <button class="btn btn-primary">Subir Documento</button>
                </div>
            </div>
        </div>
    </section>
    <section>
        <h3 class="text-primary mb-3">Documentos Disponibles</h3>
        <div class="row">
            <div class="col-12 col-md-4 mb-3">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Prostatectomía radical</h5>
                        <p class="card-text text-muted">Categoría: Indicaciones Médicas</p>
                        <button class="btn btn-outline-primary btn-sm">Ver QR</button>
                        <button class="btn btn-outline-danger btn-sm">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
